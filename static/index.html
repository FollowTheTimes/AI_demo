<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能建模引擎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#0a0e27;--bg-secondary:#111638;--bg-card:#161b40;--bg-input:#0d1230;--border-color:#1e2a5a;--border-hover:#2a3f8f;--text-primary:#e0e6ff;--text-secondary:#8892b0;--text-muted:#5a6380;--accent:#1a6bff;--accent-hover:#2d7aff;--accent-glow:rgba(26,107,255,0.3);--success:#00d68f;--success-bg:rgba(0,214,143,0.1);--warning:#ffaa00;--warning-bg:rgba(255,170,0,0.1);--danger:#ff3d71;--danger-bg:rgba(255,61,113,0.1);--radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#0d1230 0%,#1a1f4e 100%);border-bottom:1px solid var(--border-color);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),#6c5ce7);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:#fff}
.header h1{font-size:22px;font-weight:600;background:linear-gradient(90deg,#e0e6ff,#8892b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header-status{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-secondary)}
.status-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
.status-dot.online{background:var(--success)}
.status-dot.offline{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.container{display:flex;height:calc(100vh - 73px);overflow:hidden}
.sidebar{width:300px;min-width:300px;background:var(--bg-secondary);border-right:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{border-bottom:1px solid var(--border-color)}
.sidebar-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:14px;font-weight:600;color:var(--text-primary)}
.sidebar-header .count{font-size:12px;color:var(--text-muted)}
.sidebar-list{max-height:200px;overflow-y:auto;padding:8px 12px}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:2px}
.sidebar-item{padding:10px 14px;border-radius:6px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.sidebar-item:hover{background:var(--bg-card);color:var(--text-primary)}
.sidebar-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.sidebar-item .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;overflow-y:auto;padding:24px 32px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}
.section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.section-title .icon.blue{background:rgba(26,107,255,0.15);color:var(--accent)}
.section-title .icon.green{background:var(--success-bg);color:var(--success)}
.section-title .icon.orange{background:var(--warning-bg);color:var(--warning)}
textarea{width:100%;min-height:100px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius);padding:14px;color:var(--text-primary);font-size:14px;line-height:1.6;resize:vertical;transition:border-color 0.2s;font-family:inherit}
textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea::placeholder{color:var(--text-muted)}
.btn{padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4d7cff);color:#fff;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#00c080}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-outline:hover{background:rgba(26,107,255,0.1)}
.btn-outline:disabled{opacity:0.5;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px}
.controls{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
.loading-overlay{display:none;text-align:center;padding:40px}
.loading-overlay.show{display:block}
.spinner{width:48px;height:48px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-secondary);font-size:14px}
.result-panel{display:none}
.result-panel.show{display:block}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-color)}
.result-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.result-badge.success{background:var(--success-bg);color:var(--success)}
.result-badge.warning{background:var(--warning-bg);color:var(--warning)}
.result-badge.error{background:var(--danger-bg);color:var(--danger)}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.result-card{background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius);padding:14px}
.result-card .rc-label{font-size:12px;color:var(--text-muted);margin-bottom:6px}
.result-card .rc-value{font-size:15px;font-weight:600;color:var(--text-primary)}
.result-card .rc-value.accent{color:var(--accent)}
.result-card .rc-value.success{color:var(--success)}
.result-card .rc-value.warning{color:var(--warning)}
.confidence-bar{height:6px;background:var(--border-color);border-radius:3px;margin-top:8px;overflow:hidden}
.confidence-fill{height:100%;border-radius:3px;transition:width 1s ease;background:linear-gradient(90deg,var(--accent),var(--success))}
.file-info{background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.file-icon{width:48px;height:48px;border-radius:var(--radius);background:rgba(26,107,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent)}
.file-meta{flex:1}
.file-meta .file-name{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
.file-meta .file-path{font-size:12px;color:var(--text-muted);font-family:monospace}
.conditions-section{margin-top:16px}
.conditions-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.condition-list{display:flex;flex-direction:column;gap:10px}
.condition-item{background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px}
.condition-item .ci-label{flex:1}
.condition-item .ci-field{font-size:13px;font-weight:500;color:var(--text-primary)}
.condition-item .ci-type{font-size:11px;color:var(--text-muted);margin-top:2px}
.condition-item input,.condition-item select{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:4px;padding:6px 10px;color:var(--text-primary);font-size:13px;font-family:inherit}
.condition-item input:focus,.condition-item select:focus{outline:none;border-color:var(--accent)}
.condition-item input[type="text"]{width:120px}
.condition-item input.range-input{width:80px}
.referenced-templates{margin-top:12px;padding:12px;background:var(--bg-input);border-radius:var(--radius);border:1px solid var(--border-color)}
.referenced-templates .rt-label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.referenced-templates .rt-list{display:flex;flex-wrap:wrap;gap:6px}
.referenced-templates .rt-tag{padding:4px 10px;border-radius:4px;font-size:12px;background:rgba(26,107,255,0.1);color:var(--accent);border:1px solid rgba(26,107,255,0.2)}
.validation-errors{margin-top:12px;padding:12px;background:var(--danger-bg);border:1px solid rgba(255,61,113,0.3);border-radius:var(--radius)}
.validation-errors .ve-title{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px}
.validation-errors .ve-item{font-size:12px;color:var(--text-secondary);padding:4px 0}
.toast{position:fixed;top:80px;right:24px;padding:14px 24px;border-radius:var(--radius);font-size:14px;z-index:1000;transform:translateX(120%);transition:transform 0.3s ease;box-shadow:var(--shadow)}
.toast.show{transform:translateX(0)}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}
.toast.info{background:var(--accent);color:#fff}
@media(max-width:900px){.container{flex-direction:column;height:auto}.sidebar{width:100%;min-width:auto;max-height:300px}.main{padding:16px}}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<div class="logo">AI</div>
<h1>AI智能建模引擎</h1>
</div>
<div class="header-status">
<div class="status-dot online" id="statusDot"></div>
<span id="statusText">检测中...</span>
</div>
</div>
<div class="container">
<div class="sidebar">
<div class="sidebar-section">
<div class="sidebar-header">
<h2>数据源表</h2>
<span class="count" id="schemaCount">0</span>
</div>
<div class="sidebar-list" id="schemaList"></div>
</div>
<div class="sidebar-section">
<div class="sidebar-header">
<h2>模型模板</h2>
<span class="count" id="templateCount">0</span>
</div>
<div class="sidebar-list" id="templateList"></div>
</div>
</div>
<div class="main">
<div class="section">
<div class="section-title">
<span class="icon blue">&#9998;</span>
智能建模
</div>
<div style="margin-bottom:16px">
<label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:8px">需求描述</label>
<textarea id="requirementInput" placeholder="请输入建模需求描述，例如：&#10;分析账户试卡行为，找出小额试探后大额进账的账户&#10;查询资金快进快出的账户，交易金额大于1万&#10;分析同IP和MAC地址的银行账户"></textarea>
</div>
<div class="controls">
<button class="btn btn-primary" id="generateBtn" onclick="generateModel()">&#9889; 生成模型</button>
</div>
<div class="loading-overlay" id="loadingOverlay">
<div class="spinner"></div>
<div class="loading-text" id="loadingText">正在生成模型...</div>
</div>
<div class="result-panel" id="resultPanel">
<div class="result-header">
<span class="result-badge" id="resultBadge"></span>
</div>
<div class="result-grid">
<div class="result-card">
<div class="rc-label">模型类型</div>
<div class="rc-value accent" id="resultType">-</div>
</div>
<div class="result-card">
<div class="rc-label">置信度</div>
<div class="rc-value success" id="resultConfidence">-</div>
<div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
</div>
<div class="result-card">
<div class="rc-label">重试次数</div>
<div class="rc-value" id="resultRetry">-</div>
</div>
<div class="result-card">
<div class="rc-label">校验状态</div>
<div class="rc-value" id="resultValidation">-</div>
</div>
</div>
<div class="referenced-templates" id="referencedTemplates" style="display:none">
<div class="rt-label">参考模板</div>
<div class="rt-list" id="rtList"></div>
</div>
<div class="file-info" id="fileInfo" style="display:none">
<div class="file-icon">&#128196;</div>
<div class="file-meta">
<div class="file-name" id="resultFileName">-</div>
<div class="file-path" id="resultFilePath">-</div>
</div>
<div style="display:flex;gap:8px">
<button class="btn btn-outline btn-sm" onclick="downloadFile()">&#11015; 下载</button>
</div>
</div>
<div class="conditions-section" id="conditionsSection" style="display:none">
<div class="conditions-title">
<span class="icon green" style="width:22px;height:22px;font-size:11px">&#9881;</span>
筛选条件微调
</div>
<div class="condition-list" id="conditionList"></div>
<div style="margin-top:12px;display:flex;gap:8px">
<button class="btn btn-primary btn-sm" onclick="applyConditions()">&#10003; 应用修改</button>
</div>
</div>
<div class="validation-errors" id="validationErrors" style="display:none">
<div class="ve-title">校验错误</div>
<div id="veList"></div>
</div>
</div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var currentResult=null;
var currentConditions=[];

function showToast(msg,type){
var t=document.getElementById('toast');
t.textContent=msg;
t.className='toast '+type+' show';
setTimeout(function(){t.classList.remove('show')},3000);
}

function checkHealth(){
fetch('/api/health').then(function(r){return r.json()}).then(function(data){
var dot=document.getElementById('statusDot');
var text=document.getElementById('statusText');
if(data.llm_available){
dot.className='status-dot online';
text.textContent='LLM服务正常 | '+data.templates_loaded+'模板 | '+data.schemas_loaded+'数据表';
}else{
dot.className='status-dot offline';
text.textContent='LLM不可用 | '+data.templates_loaded+'模板 | '+data.schemas_loaded+'数据表';
}
}).catch(function(){
document.getElementById('statusDot').className='status-dot offline';
document.getElementById('statusText').textContent='服务连接失败';
});
}

function loadSchemas(){
fetch('/api/schemas').then(function(r){return r.json()}).then(function(data){
var list=document.getElementById('schemaList');
document.getElementById('schemaCount').textContent=data.tables.length;
data.tables.forEach(function(t){
var item=document.createElement('div');
item.className='sidebar-item';
item.innerHTML='<span class="dot"></span><span class="label" title="'+t.name+'">'+t.label+' ('+t.fields.length+'字段)</span>';
list.appendChild(item);
});
}).catch(function(){});
}

function loadTemplates(){
fetch('/api/templates').then(function(r){return r.json()}).then(function(data){
var list=document.getElementById('templateList');
document.getElementById('templateCount').textContent=data.templates.length;
data.templates.forEach(function(t){
var item=document.createElement('div');
item.className='sidebar-item';
item.innerHTML='<span class="dot"></span><span class="label" title="'+t.bz+'">'+t.title+'</span>';
list.appendChild(item);
});
}).catch(function(){});
}

function generateModel(){
var req=document.getElementById('requirementInput').value.trim();
if(!req){showToast('请输入建模需求描述','error');return;}
var btn=document.getElementById('generateBtn');
btn.disabled=true;
document.getElementById('resultPanel').classList.remove('show');
document.getElementById('loadingOverlay').classList.add('show');
document.getElementById('loadingText').textContent='正在生成模型...';
fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:req})}).then(function(r){return r.json()}).then(function(data){
document.getElementById('loadingOverlay').classList.remove('show');
btn.disabled=false;
currentResult=data;
showResult(data);
}).catch(function(err){
document.getElementById('loadingOverlay').classList.remove('show');
btn.disabled=false;
showToast('请求失败: '+err.message,'error');
});
}

function showResult(data){
var panel=document.getElementById('resultPanel');
var badge=document.getElementById('resultBadge');
if(data.success){
if(data.validation_passed){
badge.className='result-badge success';
badge.innerHTML='&#10003; 生成成功';
}else{
badge.className='result-badge warning';
badge.innerHTML='&#9888; 生成完成（校验未通过）';
}
}else{
badge.className='result-badge error';
badge.innerHTML='&#10007; 生成失败';
}

document.getElementById('resultType').textContent=data.model_type||'-';
var conf=data.confidence||0;
document.getElementById('resultConfidence').textContent=(conf*100).toFixed(0)+'%';
setTimeout(function(){document.getElementById('confidenceFill').style.width=(conf*100)+'%';},100);
document.getElementById('resultRetry').textContent=(data.retry_count||0)+'次';

var valEl=document.getElementById('resultValidation');
if(data.validation_passed){
valEl.textContent='通过';
valEl.className='rc-value success';
}else{
valEl.textContent='未通过';
valEl.className='rc-value warning';
}

if(data.referenced_templates&&data.referenced_templates.length>0){
var rtDiv=document.getElementById('referencedTemplates');
var rtList=document.getElementById('rtList');
rtList.innerHTML='';
data.referenced_templates.forEach(function(t){
var tag=document.createElement('span');
tag.className='rt-tag';
tag.textContent=t;
rtList.appendChild(tag);
});
rtDiv.style.display='block';
}

if(data.file_path){
document.getElementById('fileInfo').style.display='flex';
document.getElementById('resultFileName').textContent=data.file_name||'-';
document.getElementById('resultFilePath').textContent=data.file_path||'-';
}

if(data.conditions&&data.conditions.length>0){
currentConditions=data.conditions;
showConditions(data.conditions);
}

if(data.validation_errors&&data.validation_errors.length>0){
var veDiv=document.getElementById('validationErrors');
var veList=document.getElementById('veList');
veList.innerHTML='';
data.validation_errors.forEach(function(e){
var div=document.createElement('div');
div.className='ve-item';
div.textContent=(e.path||'')+': '+(e.message||'');
veList.appendChild(div);
});
veDiv.style.display='block';
}else{
document.getElementById('validationErrors').style.display='none';
}

if(data.message&&!data.success){
showToast(data.message,'error');
}

panel.classList.add('show');
}

function showConditions(conditions){
var list=document.getElementById('conditionList');
list.innerHTML='';
conditions.forEach(function(c,idx){
var item=document.createElement('div');
item.className='condition-item';
var inputHtml='';
if(c.type==='string'||c.type==='char'){
inputHtml='<input type="text" data-idx="'+idx+'" value="'+(typeof c.current_value==='string'?c.current_value:'')+'" onchange="updateConditionValue('+idx+',this.value)">';
}else if(c.type==='decimal'||c.type==='number'||c.type==='int'){
var cv=c.current_value||{};
if(typeof cv==='string')cv={charL:cv,charU:''};
inputHtml='<input type="text" class="range-input" placeholder="最小值" value="'+(cv.charL||'')+'" onchange="updateRangeValue('+idx+',\'charL\',this.value)"> <span style="color:var(--text-muted)">~</span> <input type="text" class="range-input" placeholder="最大值" value="'+(cv.charU||'')+'" onchange="updateRangeValue('+idx+',\'charU\',this.value)">';
}else if(c.type==='date'){
var cv2=c.current_value||{};
if(typeof cv2==='string')cv2={charL:cv2,charU:''};
inputHtml='<input type="text" class="range-input" placeholder="开始日期" value="'+(cv2.charL||'')+'" onchange="updateRangeValue('+idx+',\'charL\',this.value)"> <span style="color:var(--text-muted)">~</span> <input type="text" class="range-input" placeholder="结束日期" value="'+(cv2.charU||'')+'" onchange="updateRangeValue('+idx+',\'charU\',this.value)">';
}
item.innerHTML='<div class="ci-label"><div class="ci-field">'+c.title+' ('+c.field+')</div><div class="ci-type">'+c.type+' | 表: '+c.table_id+'</div></div>'+inputHtml;
list.appendChild(item);
});
document.getElementById('conditionsSection').style.display='block';
}

function updateConditionValue(idx,val){
currentConditions[idx].current_value=val;
}

function updateRangeValue(idx,field,val){
if(!currentConditions[idx].current_value||typeof currentConditions[idx].current_value==='string'){
currentConditions[idx].current_value={charL:'',charU:''};
}
currentConditions[idx].current_value[field]=val;
}

function applyConditions(){
if(!currentResult||!currentResult.cube_content){showToast('无可修改的模型','error');return;}
var updates=currentConditions.map(function(c){
var update={table_id:c.table_id,field:c.field};
if(c.type==='string'||c.type==='char'){
update.value=c.current_value;
}else{
update.value=c.current_value;
}
return update;
});
fetch('/api/conditions',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({cube_content:currentResult.cube_content,conditions:updates})}).then(function(r){return r.json()}).then(function(data){
if(data.success){
currentResult.cube_content=data.cube_content;
showToast('条件已更新','success');
}else{
showToast('更新失败: '+(data.errors||[]).map(function(e){return e.message}).join('; '),'error');
}
}).catch(function(err){
showToast('请求失败','error');
});
}

function downloadFile(){
if(!currentResult||!currentResult.file_name){showToast('无可下载文件','error');return;}
window.location.href='/api/download/'+currentResult.file_name;
}

checkHealth();
loadSchemas();
loadTemplates();
</script>
</body>
</html>
